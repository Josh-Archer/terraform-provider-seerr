name: OpenTofu Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  tofu-test:
    name: OpenTofu Integration Tests
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Provider
        run: go build -v -o terraform-provider-seerr

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: OpenTofu Init
        working-directory: tests
        run: tofu init

      - name: OpenTofu Test
        working-directory: tests
        env:
          SEERR_URL: ${{ secrets.SEERR_URL }}
          SEERR_API_KEY: ${{ secrets.SEERR_API_KEY }}
        run: |
          if [ -z "$SEERR_URL" ]; then
            echo "Skipping integration tests: SEERR_URL not set"
            exit 0
          fi
          tofu test -var="url=$SEERR_URL" -var="api_key=$SEERR_API_KEY"
