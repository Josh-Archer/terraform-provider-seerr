name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build-test:
    name: Build and Test
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go generate ./...
      - run: gofmt -w .
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(auto): regenerate provider documentation"
      - run: go build ./...
      - run: go test ./...
      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0

  tofu-test:
    name: OpenTofu Integration Tests
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/.tofurc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build Provider
        run: go build -v -o terraform-provider-seerr
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0
      - name: Setup Provider Mirror
        run: |
          MIRROR_PATH="${{ github.workspace }}/provider-mirror/registry.opentofu.org/josh-archer/seerr/99.99.99/linux_amd64"
          mkdir -p "$MIRROR_PATH"
          cp terraform-provider-seerr "$MIRROR_PATH/"
          echo "provider_installation {
            filesystem_mirror {
              path    = \"${{ github.workspace }}/provider-mirror\"
              include = [\"josh-archer/seerr\"]
            }
            direct {}
          }" > ${{ github.workspace }}/.tofurc
      - name: OpenTofu Init
        working-directory: tests
        run: tofu init
      - name: OpenTofu Test
        working-directory: tests
        env:
          SEERR_URL: ${{ secrets.SEERR_URL }}
          SEERR_API_KEY: ${{ secrets.SEERR_API_KEY }}
        run: |
          if [ -z "$SEERR_URL" ]; then
            echo "Skipping integration tests: SEERR_URL not set"
            exit 0
          fi
          tofu test -var="url=$SEERR_URL" -var="api_key=$SEERR_API_KEY"

  auto-tag:
    name: Auto Tag
    needs: [build-test, tofu-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || vars.USE_SELF_HOSTED == true) && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          create_annotated_tag: true
          tag_prefix: v

      - name: Trigger release workflow for new tag
        if: steps.tag_version.outputs.new_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref ${{ steps.tag_version.outputs.new_tag }}
