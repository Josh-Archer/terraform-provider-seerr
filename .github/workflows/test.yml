name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      integration_mode:
        description: Which integration coverage to run
        required: true
        default: stable
        type: choice
        options:
          - stable
          - full
          - both

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    # Fork and same-repository PRs always use an isolated GitHub-hosted runner.
    # Trusted runs can use UECB or an isolated self-hosted runner via this label.
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || vars.TRUSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - name: Run fast merge gate
        run: bash ./scripts/test-all-locally.sh
        env:
          SEERR_RUN_LINT: "false"
          SEERR_RUN_INTEGRATION: "false"
      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0

  tofu-test-stable:
    name: OpenTofu Stable Integration (${{ matrix.tofu_version }})
    runs-on: ubuntu-latest
    environment: public-ci
    permissions:
      contents: read
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        tofu_version:
          - 1.8.0
    env:
      USE_SELF_HOSTED: "false"
      SEERR_TEST_IMAGE: ${{ vars.SEERR_TEST_IMAGE || 'seerr/seerr:v3.1.1' }}
      SEERR_ARTIFACT_DIR: ${{ github.workspace }}/test-artifacts/integration
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ matrix.tofu_version }}
      - name: Use legacy external Seerr target when configured
        shell: bash
        run: |
          if [[ -n "${LEGACY_SEERR_URL:-}" ]] && [[ "${USE_SELF_HOSTED:-false}" == "false" ]]; then
            echo "Using Legacy External Seerr Instance"
            echo "SEERR_URL=${LEGACY_SEERR_URL}" >> "$GITHUB_ENV"
            echo "SEERR_API_KEY=${LEGACY_SEERR_API_KEY}" >> "$GITHUB_ENV"
          fi
      - name: OpenTofu stable suite
        shell: bash
        run: bash ./scripts/test-integration.sh
        env:
          SEERR_TEST_SUITE: stable
      - name: Upload integration diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stable-integration-artifacts-${{ matrix.tofu_version }}
          path: test-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  tofu-test-stable-trusted:
    name: OpenTofu Stable Integration Trusted (${{ matrix.tofu_version }})
    runs-on: ${{ vars.TRUSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    environment: integration
    permissions:
      contents: read
    timeout-minutes: 15
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.integration_mode != 'full')
    strategy:
      fail-fast: false
      matrix:
        tofu_version:
          - 1.8.0
    env:
      USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED || 'false' }}
      LEGACY_SEERR_URL: ${{ secrets.SEERR_URL }}
      LEGACY_SEERR_API_KEY: ${{ secrets.SEERR_API_KEY }}
      SEERR_TEST_IMAGE: ${{ vars.SEERR_TEST_IMAGE || 'seerr/seerr:v3.1.1' }}
      SEERR_ARTIFACT_DIR: ${{ github.workspace }}/test-artifacts/integration-trusted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ matrix.tofu_version }}
      - name: Use legacy external Seerr target when configured
        shell: bash
        run: |
          if [[ -n "${LEGACY_SEERR_URL:-}" ]] && [[ "${USE_SELF_HOSTED:-false}" == "false" ]]; then
            echo "Using Legacy External Seerr Instance"
            echo "SEERR_URL=${LEGACY_SEERR_URL}" >> "$GITHUB_ENV"
            echo "SEERR_API_KEY=${LEGACY_SEERR_API_KEY}" >> "$GITHUB_ENV"
          fi
      - name: OpenTofu stable suite
        shell: bash
        run: bash ./scripts/test-integration.sh
        env:
          SEERR_TEST_SUITE: stable
      - name: Upload integration diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trusted-stable-integration-artifacts-${{ matrix.tofu_version }}
          path: test-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  tofu-test-full:
    name: OpenTofu Full Compatibility (${{ matrix.tofu_version }})
    runs-on: ${{ vars.TRUSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    environment: integration
    permissions:
      contents: read
    timeout-minutes: 20
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.integration_mode != 'stable')
    strategy:
      fail-fast: false
      matrix:
        tofu_version:
          - 1.8.0
    env:
      USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED || 'false' }}
      LEGACY_SEERR_URL: ${{ secrets.SEERR_URL }}
      LEGACY_SEERR_API_KEY: ${{ secrets.SEERR_API_KEY }}
      SEERR_TEST_IMAGE: ${{ vars.SEERR_TEST_IMAGE || 'seerr/seerr:v3.1.1' }}
      SEERR_ARTIFACT_DIR: ${{ github.workspace }}/test-artifacts/integration-full
      SEERR_TEST_SUITE: all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ matrix.tofu_version }}
      - name: Use legacy external Seerr target when configured
        shell: bash
        run: |
          if [[ -n "${LEGACY_SEERR_URL:-}" ]] && [[ "${USE_SELF_HOSTED:-false}" == "false" ]]; then
            echo "Using Legacy External Seerr Instance"
            echo "SEERR_URL=${LEGACY_SEERR_URL}" >> "$GITHUB_ENV"
            echo "SEERR_API_KEY=${LEGACY_SEERR_API_KEY}" >> "$GITHUB_ENV"
          fi
      - name: OpenTofu full suite
        shell: bash
        run: bash ./scripts/test-integration.sh
      - name: Upload full-suite diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-integration-artifacts-${{ matrix.tofu_version }}
          path: test-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  auto-tag:
    name: Auto Tag
    needs: [build-test, tofu-test-stable-trusted]
    concurrency:
      group: release-tag-reconciliation
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ vars.TRUSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reconcile all eligible release tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_RECONCILE_FROM_TAG: ${{ vars.RELEASE_RECONCILE_FROM_TAG || 'v0.20.5' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          release_deadline=$((SECONDS + 3600))

          wait_for_release() {
            local tag="$1"
            local response

            while (( SECONDS < release_deadline )); do
              if response="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.draft' 2>&1)"; then
                if [[ "${response}" == "false" ]]; then
                  echo "Release ${tag} is published."
                  return 0
                fi
                if [[ "${response}" != "true" ]]; then
                  echo "Unexpected GitHub Release response for ${tag}: ${response}" >&2
                  return 1
                fi
              elif [[ "${response}" != *"(HTTP 404)"* ]]; then
                echo "Unable to inspect GitHub Release ${tag}: ${response}" >&2
                return 1
              fi
              sleep 10
            done

            echo "Timed out waiting for release reconciliation to finish; ${tag} is still unpublished." >&2
            return 1
          }

          while true; do
            result="$(bash ./scripts/reconcile-release-tags.sh)"
            tag="${result%%|*}"
            in_flight="${result#*|}"

            if [[ -z "${tag}" ]]; then
              echo "All eligible release tags are published."
              break
            fi

            if [[ "${in_flight}" != "true" ]]; then
              echo "Dispatching the current hardened Release workflow for orphaned tag ${tag}"
              gh workflow run release.yml \
                --repo "${GITHUB_REPOSITORY}" \
                --ref "${DEFAULT_BRANCH}" \
                -f "release_tag=${tag}"
            else
              echo "Release for ${tag} is already queued or running."
            fi

            wait_for_release "${tag}"
          done

      - name: Verify current default-branch tip
        id: default_branch_tip
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          current="$(bash ./scripts/release-tip-is-current.sh "${GITHUB_SHA}" "${DEFAULT_BRANCH}")"
          echo "current=${current}" >> "${GITHUB_OUTPUT}"
          if [[ "${current}" != "true" ]]; then
            echo "Skipping version allocation because ${GITHUB_SHA} is no longer the ${DEFAULT_BRANCH} tip."
          fi

      - name: Bump version and push tag
        id: tag_version
        if: steps.default_branch_tip.outputs.current == 'true'
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create_annotated_tag: true
          tag_prefix: v

      - name: Verify tagged commit is still the default-branch tip
        id: tagged_branch_tip
        if: steps.default_branch_tip.outputs.current == 'true' && steps.tag_version.outputs.new_tag != ''
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
        shell: bash
        run: |
          set -euo pipefail
          current="$(bash ./scripts/release-tip-is-current.sh "${GITHUB_SHA}" "${DEFAULT_BRANCH}")"
          echo "current=${current}" >> "${GITHUB_OUTPUT}"
          if [[ "${current}" == "true" ]]; then
            exit 0
          fi

          git fetch --force origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tagged_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          if [[ "${tagged_commit}" != "${GITHUB_SHA}" ]]; then
            echo "Refusing to delete ${RELEASE_TAG}: it no longer points to this run's commit." >&2
            exit 1
          fi
          git push origin ":refs/tags/${RELEASE_TAG}"
          echo "Removed stale ${RELEASE_TAG}; ${GITHUB_SHA} was no longer the ${DEFAULT_BRANCH} tip after tag creation." >&2
          exit 1

      # Tags created with GITHUB_TOKEN do not fire on.push workflows (GitHub
      # recursion guard). Explicitly dispatch Release so GoReleaser runs.
      - name: Trigger Release workflow for new tag
        if: steps.tagged_branch_tip.outputs.current == 'true' && steps.tag_version.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          echo "Dispatching Release for ${RELEASE_TAG}"
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${DEFAULT_BRANCH}" \
            -f "release_tag=${RELEASE_TAG}"
